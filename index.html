<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to the Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #111;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .hero button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      background: white;
      color: #333;
      border-radius: 5px;
      cursor: pointer;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h2>Hub</h2>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Welcome to the Hub/h1>
    <p>Build something amazing 🚀</p>
    <button>Get Started</button>
  </section>

  <section class="section">
    <h2>Websites</h2>
    <div class="cards">
      <div class="card">
        <h3>Code Academy</h3>
        <p>Teaches young kids the principles of coding.</p>
      </div>
      <div class="card">
        <h3>Chat</h3>
        <p>Chatbox for friend to collaborate.</p>
      </div>
      <div class="card">
        <h3>Scalable</h3>
        <p>Built to grow with your needs.</p>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 My Website</p>
  </footer>

</body>
</html>
