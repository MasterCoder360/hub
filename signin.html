<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hub — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06060f;
      font-family: Arial, sans-serif;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      border: none;
      color: white;
      cursor: pointer;
    }

    .error { color: red; }
    .success { color: lightgreen; }
  </style>
</head>

<body>

<div class="card">
  <h2>Sign In</h2>

  <form id="login-form">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <p id="error-msg" class="error" style="display:none;"></p>
    <button type="submit">Sign In</button>
  </form>

  <p id="success-msg" class="success" style="display:none;">
    Logged in! Redirecting...
  </p>
</div>

<script>
  const SUPABASE_URL = "https://vvawpegbbxhonlijbtcn.supabase.co";
  const SUPABASE_ANON = "YOUR_KEY_HERE"; // keep your existing key

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const form = document.getElementById("login-form");
  const errorMsg = document.getElementById("error-msg");
  const successMsg = document.getElementById("success-msg");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    errorMsg.style.display = "none";

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await client.auth.signInWithPassword({ email, password });

    if (error) {
      errorMsg.textContent = error.message;
      errorMsg.style.display = "block";
    } else {
      localStorage.setItem("loggedIn", "true");

      form.style.display = "none";
      successMsg.style.display = "block";

      const params = new URLSearchParams(window.location.search);
      const redirect = params.get("redirect");

      setTimeout(() => {
        if (redirect) {
          window.location.href = redirect;
        } else {
          window.location.href = "index.html";
        }
      }, 1000);
    }
  });
</script>

</body>
</html>
