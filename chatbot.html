<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant</title>
  <style>
      :root {
          --glass-bg: rgba(255, 255, 255, 0.15);
          --glass-border: rgba(255, 255, 255, 0.3);
          --text-primary: #ffffff;
          --text-secondary: rgba(255, 255, 255, 0.7);
          --accent-blue: #7dd3fc;
          --user-bubble: rgba(255, 255, 255, 0.2);
          --blur-val: 12px;
      }

      * { box-sizing: border-box; }
     
      body {
          margin: 0;
          font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #581c87 100%);
          background-attachment: fixed;
          color: var(--text-primary);
          display: flex;
          flex-direction: column;
          height: 100vh;
      }

      .navbar {
          display: flex;
          align-items: center;
          padding: 15px 30px;
          background: var(--glass-bg);
          backdrop-filter: blur(var(--blur-val));
          -webkit-backdrop-filter: blur(var(--blur-val));
          border-bottom: 1px solid var(--glass-border);
          font-size: 14px;
          z-index: 10;
      }
      .logo {
          font-weight: bold;
          font-size: 20px;
          margin-right: 20px;
          color: var(--accent-blue);
          text-shadow: 0 0 10px rgba(125, 211, 252, 0.5);
      }

      .chat-container {
          flex: 1;
          display: flex;
          flex-direction: column;
          width: 95%;
          max-width: 900px;
          margin: 20px auto;
          background: var(--glass-bg);
          backdrop-filter: blur(var(--blur-val));
          -webkit-backdrop-filter: blur(var(--blur-val));
          border-radius: 24px;
          border: 1px solid var(--glass-border);
          box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
          overflow: hidden;
      }

      #messages {
          flex: 1;
          overflow-y: auto;
          padding: 30px;
          display: flex;
          flex-direction: column;
          gap: 20px;
      }

      .message {
          max-width: 80%;
          line-height: 1.6;
          font-size: 15px;
          backdrop-filter: blur(5px);
      }
      .user-message {
          align-self: flex-end;
          background: var(--user-bubble);
          padding: 12px 20px;
          border-radius: 20px 20px 0 20px;
          border: 1px solid var(--glass-border);
      }
      .ai-message {
          align-self: flex-start;
          padding: 10px 0;
          border-left: 4px solid var(--accent-blue);
          padding-left: 20px;
          color: #e2e8f0;
      }

      .input-wrapper {
          padding: 25px;
          background: rgba(0, 0, 0, 0.1);
      }
      .search-bar {
          display: flex;
          align-items: center;
          background: rgba(255, 255, 255, 0.1);
          border: 1px solid var(--glass-border);
          border-radius: 30px;
          padding: 5px 10px 5px 25px;
          transition: all 0.3s ease;
      }
      .search-bar:focus-within {
          background: rgba(255, 255, 255, 0.2);
          box-shadow: 0 0 15px rgba(125, 211, 252, 0.3);
          border-color: var(--accent-blue);
      }
      #input {
          flex: 1;
          border: none;
          outline: none;
          padding: 12px 0;
          font-size: 16px;
          background: transparent;
          color: #fff;
      }
      #input::placeholder {
          color: rgba(255, 255, 255, 0.5);
      }
      #send {
          background: var(--accent-blue);
          border: none;
          color: #0f172a;
          font-weight: bold;
          cursor: pointer;
          padding: 10px 25px;
          border-radius: 20px;
          font-size: 14px;
          transition: transform 0.2s;
          margin-left: 10px;
      }
      #send:hover { transform: scale(1.05); }
      #send:disabled { background: var(--text-secondary); cursor: not-allowed; }

      .status-indicator {
          font-size: 12px;
          color: var(--accent-blue);
          text-align: center;
          margin-bottom: 10px;
          height: 15px;
      }

      .clear-chat {
          background: rgba(255, 255, 255, 0.1);
          border: 1px solid var(--glass-border);
          color: var(--text-secondary);
          padding: 8px 16px;
          border-radius: 20px;
          font-size: 12px;
          cursor: pointer;
          transition: all 0.3s ease;
          margin-left: auto;
      }
      .clear-chat:hover {
          background: rgba(255, 0, 0, 0.2);
          color: var(--text-primary);
      }

      #messages::-webkit-scrollbar { width: 6px; }
      #messages::-webkit-scrollbar-thumb {
          background: var(--glass-border);
          border-radius: 10px;
      }
  </style>
</head>
<body>

  <div class="navbar">
      <div class="logo">SearchAI</div>
      <div style="color: var(--text-secondary)">Memory Enabled</div>
      <button class="clear-chat" id="clearChat">Clear Chat</button>
  </div>

  <div class="chat-container">
      <div id="messages">
          <div style="text-align:center; color: var(--text-secondary); margin-top: 40px; font-style: italic;">
              How can I help you today? 
          </div>
      </div>

      <div class="input-wrapper">
          <div id="status" class="status-indicator"></div>
          <div class="search-bar">
              <input id="input" type="text" placeholder="Ask a question..." autocomplete="off">
              <button id="send">Send</button>
          </div>
      </div>
  </div>

<script>
let sending = false;
const apiUrl = 'https://ai-server-ivory.vercel.app/api/chat';
let conversationHistory = [];
const MAX_HISTORY = 15; // Reduced to prevent issues

function addMessage(text, isUser) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message ' + (isUser ? 'user-message' : 'ai-message');
  msgDiv.innerHTML = text.replace(/\n/g, '<br>');
  document.getElementById('messages').appendChild(msgDiv);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function clearChat() {
  document.getElementById('messages').innerHTML = `
    <div style="text-align:center; color: var(--text-secondary); margin-top: 40px; font-style: italic;">
        Chat cleared! How can I help you now? 
    </div>
  `;
  conversationHistory = [];
}

function buildPromptWithHistory(userInput) {
  // Build context from history
  let context = "";
  if (conversationHistory.length > 0) {
    context = "Previous conversation:\n";
    conversationHistory.slice(-MAX_HISTORY + 1).forEach(msg => {
      const role = msg.role === 'user' ? 'You: ' : 'AI: ';
      context += `${role}"${msg.content}"\n`;
    });
    context += "\nNow respond to this new question:\n";
  }
  
  return `${context}${userInput}`;
}

async function send() {
  if (sending) return;
  
  const input = document.getElementById('input');
  const btn = document.getElementById('send');
  const status = document.getElementById('status');
  const text = input.value.trim();
  
  if (!text) return;

  sending = true;
  input.value = '';
  btn.disabled = true;
  status.innerText = 'Thinking...';

  // Add user message to history and UI
  const userMessage = { role: 'user', content: text };
  conversationHistory.push(userMessage);
  addMessage(text, true);

  try {
    // Build full prompt with conversation history
    const fullPrompt = buildPromptWithHistory(text);
    
    console.log('Sending prompt:', fullPrompt); // Debug log
    
    const res = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        prompt: fullPrompt,  // Your API expects 'prompt'
        model: 'Xenova/distilgpt2'
      })
    });
    
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    }
    
    const data = await res.json();
    console.log('API Response:', data); // Debug log
    
    const aiResponse = data.response || data.answer || data.text || 'Sorry, I couldn\'t process that.';
    
    // Add AI response to history and UI
    const aiMessage = { role: 'assistant', content: aiResponse };
    conversationHistory.push(aiMessage);
    addMessage(aiResponse, false);
    
    status.innerText = '';
    
  } catch (error) {
    console.error('API Error:', error);
    addMessage(`Error: ${error.message}. Please try again.`, false);
    status.innerText = 'Connection failed';
  } finally {
    sending = false;
    btn.disabled = false;
  }
}

// Event listeners
document.getElementById('send').onclick = send;
document.getElementById('input').onkeydown = e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
};
document.getElementById('clearChat').onclick = clearChat;
</script>
</body>
</html>
