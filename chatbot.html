<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤗 AI Chat - GitHub + Vercel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
      padding: 20px;
    }
    .app {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(25px);
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }
    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(45deg, #00ff88, #00cc6a);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      text-align: center;
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 25px;
    }
    .demo-btn, .send-btn {
      background: linear-gradient(45deg, #00ff88, #00cc6a);
      border: none;
      padding: 15px 30px;
      border-radius: 50px;
      color: #000;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1rem;
    }
    .demo-btn:hover, .send-btn:hover:not(:disabled) { 
      transform: scale(1.05); 
      box-shadow: 0 10px 30px rgba(0,255,136,0.4); 
    }
    .send-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.1rem;
      margin-top: 12px;
    }
    .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .status {
      padding: 15px;
      border-radius: 12px;
      margin: 20px 0;
      text-align: center;
      font-weight: 600;
    }
    .status.ready { background: rgba(0,255,136,0.2); color: #00ff88; border: 2px solid #00ff88; }
    .status.loading { background: rgba(255,193,7,0.3); color: #ffc107; border: 2px solid #ffc107; }
    .status.success { background: rgba(76,175,80,0.3); color: #4caf50; border: 2px solid #4caf50; }
    .status.error { background: rgba(244,67,54,0.3); color: #f44336; border: 2px solid #f44336; }
    .section {
      margin-bottom: 20px;
      padding: 20px;
      background: rgba(255,255,255,0.02);
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    label { display: block; margin-bottom: 10px; font-weight: 600; color: #fff; }
    select, textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    .chat {
      height: 400px;
      overflow-y: auto;
      background: rgba(0,0,0,0.25);
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .message {
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 15px;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .user-msg { background: rgba(0,255,136,0.15); border-left: 4px solid #00ff88; margin-left: 10%; }
    .ai-msg { background: rgba(100,200,255,0.15); border-left: 4px solid #00d4ff; margin-right: 10%; }
    .server-status {
      font-size: 0.8rem;
      opacity: 0.7;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="app">
  <h1>🤗 AI Chat</h1>
  <p class="subtitle">GitHub Pages Frontend + Vercel AI Server ⚡</p>
  
  <button class="demo-btn" id="demoBtn" style="display:block; margin:0 auto 20px;">🎮 Test AI Server</button>
  
  <div class="section">
    <label>🤖 AI Model</label>
    <select id="modelSelect">
      <option value="Xenova/distilgpt2">⚡ Fast (Recommended)</option>
      <option value="Xenova/gpt2">🔥 Smarter</option>
    </select>
  </div>
  
  <div class="section">
    <label>💭 Your Message</label>
    <textarea id="messageInput" placeholder="Type your message... (Press Enter to send)"></textarea>
    <button class="send-btn" id="sendBtn">🚀 Send to AI</button>
  </div>
  
  <div id="status" class="status ready">
    🎉 Ready! Click "Test AI Server" or start chatting
  </div>
  <div class="server-status">
    🔗 Server: <span id="serverUrl">Not connected</span>
  </div>
  <div id="chat" class="chat"></div>
</div>

<script>
let isSending = false;
const SERVER_URL = 'https://ai-server-ivory.vercel.app/'; // ← CHANGE THIS!

function updateStatus(text, type='ready') {
  document.getElementById('status').innerHTML = text;
  document.getElementById('status').className = `status ${type}`;
}

function addMessage(sender, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `message ${sender === 'You' ? 'user-msg' : 'ai-msg'}`;
  div.innerHTML = `<strong>${sender}:</strong> ${text}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function chatWithAI(prompt, model='Xenova/distilgpt2') {
  const controller = new AbortController();
  setTimeout(() => controller.abort(), 25000);

  try {
    const res = await fetch(SERVER_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt, model}),
      signal: controller.signal
    });
    
    if (!res.ok) throw new Error(`Server ${res.status}`);
    const data = await res.json();
    return data.response || 'No response received';
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('Request timeout');
    throw new Error(e.message || 'Connection failed');
  }
}

async function sendMessage() {
  if (isSending) return;
  
  const input = document.getElementById('messageInput');
  const btn = document.getElementById('sendBtn');
  const prompt = input.value.trim();
  
  if (!prompt) return;
  
  isSending = true;
  input.value = '';
  btn.disabled = true;
  btn.textContent = '🤔 AI Thinking...';
  updateStatus('🧠 AI is responding...', 'loading');
  
  addMessage('You', prompt);
  
  try {
    const model = document.getElementById('modelSelect').value;
    const response = await chatWithAI(prompt, model);
    addMessage('🤖 AI', response);
    updateStatus('✅ Message sent! Ready for more.', 'success');
  } catch (error) {
    console.error('AI Error:', error);
    addMessage('🤖 AI', `❌ Error: ${error.message}`);
    updateStatus('❌ Connection failed - check server URL', 'error');
  } finally {
    isSending = false;
    btn.disabled = false;
    btn.textContent = '🚀 Send to AI';
  }
}

async function demoChat() {
  const btn = document.getElementById('demoBtn');
  btn.disabled = true;
  btn.textContent = '🧪 Testing...';
  updateStatus('🚀 Connecting to AI server...', 'loading');
  
  document.getElementById('serverUrl').textContent = SERVER_URL;
  
  try {
    const response = await chatWithAI('Hello AI! Tell me a fun fact.', 'Xenova/distilgpt2');
    addMessage('You', 'Hello AI! Tell me a fun fact.');
    addMessage('🤖 AI', response);
    updateStatus('🎉 Server connected! Chat works perfectly!', 'success');
  } catch (error) {
    addMessage('🤖 AI', `❌ Server error: ${error.message}<br><br>👉 Update SERVER_URL in code`);
    updateStatus('❌ Server not responding - check Vercel URL', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '🎮 Test AI Server';
  }
}

// Event Listeners
document.getElementById('demoBtn').onclick = demoChat;
document.getElementById('sendBtn').onclick = sendMessage;

document.getElementById('messageInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto demo after load
window.onload = () => {
  setTimeout(demoChat, 1500);
};
</script>
</body>
</html>
