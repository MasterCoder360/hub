<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Companion</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #4facfe, #00f2fe);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  color: #fff;
}
header {
  text-align: center;
  padding: 40px 20px 20px;
  font-size: 2rem;
  font-weight: bold;
  text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
}
main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
}
.chat-container {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 20px;
  width: 100%;
  max-width: 600px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
textarea {
  width: 100%;
  height: 100px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.4);
  padding: 10px;
  font-size: 1rem;
  resize: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
}
textarea::placeholder {
  color: rgba(255,255,255,0.7);
}
button {
  margin-top: 10px;
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.2);
  color: #fff;
  cursor: pointer;
  font-size: 1rem;
  backdrop-filter: blur(10px);
  transition: background 0.3s, transform 0.3s;
}
button:hover {
  background: rgba(255,255,255,0.35);
  transform: scale(1.05);
}
#output {
  margin-top: 20px;
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 12px;
  max-height: 300px;
  overflow-y: auto;
  color: #000;
}
footer {
  text-align: center;
  padding: 15px;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(10px);
}
</style>
</head>
<body>

<header>AI Chat Companion</header>

<main>
  <div class="chat-container">
    <textarea id="userInput" placeholder="Type your question here..."></textarea>
    <button onclick="sendPrompt()">Ask AI</button>
    <div id="output"></div>
  </div>
</main>

<footer>© 2026 AI Chat Companion</footer>

<script>
const OPENROUTER_API_KEY = "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"; // replace with your OpenRouter API key

async function callOpenRouter(prompt) {
  const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": `Bearer ${OPENROUTER_API_KEY}`
    },
    body: JSON.stringify({
      model: "openai/gpt-4", // you can switch to a free model if needed
      messages: [{ role: "user", content: prompt }],
      max_tokens: 300
    })
  });
  const data = await res.json();
  return data.choices?.[0]?.message?.content || "No response";
}

async function sendPrompt() {
  const input = document.getElementById("userInput");
  const output = document.getElementById("output");
  const prompt = input.value.trim();
  if(!prompt) return;
  output.textContent = "AI is thinking...";
  try {
    const answer = await callOpenRouter(prompt);
    output.textContent = answer;
  } catch(e) {
    output.textContent = "Error: " + e.message;
  }
}
</script>

</body>
</html>
