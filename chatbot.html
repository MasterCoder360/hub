<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant</title>
  <style>
      :root {
          /* Glass Colors */
          --glass-bg: rgba(255, 255, 255, 0.15);
          --glass-border: rgba(255, 255, 255, 0.3);
          --text-primary: #ffffff;
          --text-secondary: rgba(255, 255, 255, 0.7);
          --accent-blue: #7dd3fc;
          --user-bubble: rgba(255, 255, 255, 0.2);
          --blur-val: 12px;
      }

      * { box-sizing: border-box; }
     
      body {
          margin: 0;
          font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          /* A colorful animated background helps the glass look real */
          background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #581c87 100%);
          background-attachment: fixed;
          color: var(--text-primary);
          display: flex;
          flex-direction: column;
          height: 100vh;
      }

      /* Top Navigation Bar */
      .navbar {
          display: flex;
          align-items: center;
          padding: 15px 30px;
          background: var(--glass-bg);
          backdrop-filter: blur(var(--blur-val));
          -webkit-backdrop-filter: blur(var(--blur-val));
          border-bottom: 1px solid var(--glass-border);
          font-size: 14px;
          z-index: 10;
      }
      .logo {
          font-weight: bold;
          font-size: 20px;
          margin-right: 20px;
          color: var(--accent-blue);
          text-shadow: 0 0 10px rgba(125, 211, 252, 0.5);
      }

      /* Chat Container */
      .chat-container {
          flex: 1;
          display: flex;
          flex-direction: column;
          width: 95%;
          max-width: 900px;
          margin: 20px auto;
          background: var(--glass-bg);
          backdrop-filter: blur(var(--blur-val));
          -webkit-backdrop-filter: blur(var(--blur-val));
          border-radius: 24px;
          border: 1px solid var(--glass-border);
          box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
          overflow: hidden;
      }

      #messages {
          flex: 1;
          overflow-y: auto;
          padding: 30px;
          display: flex;
          flex-direction: column;
          gap: 20px;
      }

      /* Message Styling */
      .message {
          max-width: 80%;
          line-height: 1.6;
          font-size: 15px;
          backdrop-filter: blur(5px);
      }
      .user-message {
          align-self: flex-end;
          background: var(--user-bubble);
          padding: 12px 20px;
          border-radius: 20px 20px 0 20px;
          border: 1px solid var(--glass-border);
      }
      .ai-message {
          align-self: flex-start;
          padding: 10px 0;
          border-left: 4px solid var(--accent-blue);
          padding-left: 20px;
          color: #e2e8f0;
      }

      /* Input Area */
      .input-wrapper {
          padding: 25px;
          background: rgba(0, 0, 0, 0.1);
      }
      .search-bar {
          display: flex;
          align-items: center;
          background: rgba(255, 255, 255, 0.1);
          border: 1px solid var(--glass-border);
          border-radius: 30px;
          padding: 5px 10px 5px 25px;
          transition: all 0.3s ease;
      }
      .search-bar:focus-within {
          background: rgba(255, 255, 255, 0.2);
          box-shadow: 0 0 15px rgba(125, 211, 252, 0.3);
          border-color: var(--accent-blue);
      }
      #input {
          flex: 1;
          border: none;
          outline: none;
          padding: 12px 0;
          font-size: 16px;
          background: transparent;
          color: #fff;
      }
      #input::placeholder {
          color: rgba(255, 255, 255, 0.5);
      }
      #send {
          background: var(--accent-blue);
          border: none;
          color: #0f172a;
          font-weight: bold;
          cursor: pointer;
          padding: 10px 25px;
          border-radius: 20px;
          font-size: 14px;
          transition: transform 0.2s;
          margin-left: 10px;
      }
      #send:hover { transform: scale(1.05); }
      #send:disabled { background: var(--text-secondary); cursor: not-allowed; }

      .status-indicator {
          font-size: 12px;
          color: var(--accent-blue);
          text-align: center;
          margin-bottom: 10px;
          height: 15px;
      }

      /* Scrollbar Styling */
      #messages::-webkit-scrollbar { width: 6px; }
      #messages::-webkit-scrollbar-thumb {
          background: var(--glass-border);
          border-radius: 10px;
      }
  </style>
</head>
<body>

  <div class="navbar">
      <div class="logo">SearchAI</div>
      <div style="color: var(--text-secondary)">Second Edition</div>
  </div>

  <div class="chat-container">
      <div id="messages">
          <div style="text-align:center; color: var(--text-secondary); margin-top: 40px; font-style: italic;">
              How can I help you today?
          </div>
      </div>

      <div class="input-wrapper">
          <div id="status" class="status-indicator"></div>
          <div class="search-bar">
              <input id="input" type="text" placeholder="Ask a question..." autocomplete="off">
              <button id="send">Search</button>
          </div>
      </div>
  </div>

<script>
let sending = false;
const apiUrl = 'https://ai-server-ivory.vercel.app/api/chat';

function addMessage(text, isUser) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message ' + (isUser ? 'user-message' : 'ai-message');
  msgDiv.innerHTML = text.replace(/\n/g, '<br>');
  document.getElementById('messages').appendChild(msgDiv);
  const messages = document.getElementById('messages');
  messages.scrollTop = messages.scrollHeight;
}

async function send() {
  if (sending) return;
  const input = document.getElementById('input');
  const btn = document.getElementById('send');
  const status = document.getElementById('status');
  const text = input.value.trim();
   if (!text) return;

  sending = true;
  input.value = '';
  btn.disabled = true;
  status.innerText = 'Analyzing neural pathways...';
   addMessage(text, true);

  try {
      const res = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: text, model: 'Xenova/distilgpt2' })
      });
      const data = await res.json();
      addMessage(data.response || 'No information found.');
      status.innerText = '';
  } catch (e) {
      addMessage('Error connecting to service.');
      status.innerText = 'Connection Error';
  } finally {
      sending = false;
      btn.disabled = false;
  }
}

document.getElementById('send').onclick = send;
document.getElementById('input').onkeydown = e => {
  if (e.key === 'Enter') send();
};
</script>
</body>
</html>
